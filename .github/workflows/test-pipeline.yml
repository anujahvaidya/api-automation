name: API Automation Tests

# Triggers — when does this pipeline run?
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  run-api-tests:
    name: Run API Tests on Ubuntu
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Check out your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Java 17 (matches your local setup)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache Maven dependencies
      # This makes subsequent runs much faster
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4 — Run your tests (same command you ran locally)
      - name: Run TestNG tests via Maven
        run: mvn clean test

      # Step 5 — Upload test reports as downloadable artifact
      - name: Upload Surefire test reports
        uses: actions/upload-artifact@v4
        if: always()   # runs even if tests fail — so you always get the report
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 30